<header class="header">
  <div class="container inner">
    <div class="left">
      <button type="button" class="lang" (click)="toggleLang()" aria-label="Sprache umschalten">
        <span [class.active]="i18n.lang === 'en'">EN</span>
        <span class="sep">|</span>
        <span [class.active]="i18n.lang === 'de'">DE</span>
      </button>

      <nav class="nav" aria-label="Hauptnavigation">
        <button type="button" class="nav-btn" (click)="goTo('about')">{{ 'nav.about' | t }}</button>
        <button type="button" class="nav-btn" (click)="goTo('academyImpact')">{{ 'nav.academyImpact' | t }}</button>
        <button type="button" class="nav-btn" (click)="goTo('skills')">{{ 'nav.skills' | t }}</button>
        <button type="button" class="nav-btn" (click)="goTo('projects')">{{ 'nav.projects' | t }}</button>
      </nav>
    </div>

    <div class="actions">
      <button type="button" class="contactBtn" (click)="goTo('contact')">{{ 'nav.contact' | t }}</button>

      <div class="logo" aria-label="Logo">SG</div>

      <button
        type="button"
        class="burger"
        (click)="toggleMenu()"
        aria-controls="mobile-menu"
        [attr.aria-expanded]="menuOpen"
        aria-label="Menü öffnen"
      >
        <span class="burger-line"></span>
        <span class="burger-line"></span>
        <span class="burger-line"></span>
      </button>
    </div>
  </div>

  <button
    type="button"
    class="backdrop"
    (click)="closeMenu()"
    [class.open]="menuOpen"
    aria-hidden="true"
    tabindex="-1"
  ></button>

  <div
    id="mobile-menu"
    class="mobile-drawer"
    role="dialog"
    aria-modal="true"
    [attr.aria-hidden]="!menuOpen"
    [class.open]="menuOpen"
  >
    <nav class="mobile-nav" aria-label="Mobile Navigation">
      <button type="button" class="nav-btn" (click)="navigateTo('about')">{{ 'nav.about' | t }}</button>
      <button type="button" class="nav-btn" (click)="navigateTo('academyImpact')">{{ 'nav.academyImpact' | t }}</button>
      <button type="button" class="nav-btn" (click)="navigateTo('skills')">{{ 'nav.skills' | t }}</button>
      <button type="button" class="nav-btn" (click)="navigateTo('projects')">{{ 'nav.projects' | t }}</button>
      <button type="button" class="nav-btn" (click)="navigateTo('journey')">{{ 'nav.journey' | t }}</button>
      <button type="button" class="nav-btn" (click)="navigateTo('contact')">{{ 'nav.contact' | t }}</button>
    </nav>

    <div class="mobile-links">
      <a class="link" routerLink="/privacy" (click)="closeMenu()">{{ 'nav.privacy' | t }}</a>
      <a class="link" routerLink="/imprint" (click)="closeMenu()">{{ 'nav.imprint' | t }}</a>
    </div>
  </div>
</header>
