<footer class="footer">
  <div class="container inner">
    <div class="brand">
      <div class="logo">SG</div>
      <div>
        <div class="role">{{ 'footer.role' | t }}</div>
        <div class="loc">{{ 'footer.location' | t }}</div>
      </div>
    </div>

    <small class="copy">© {{ currentYear }} Stephan Gilles</small>

    <div class="links">
      <a href="https://github.com/SteGi78" target="_blank" rel="noopener">GitHub</a>
      <a href="https://www.linkedin.com/in/stephan-gilles/" target="_blank" rel="noopener">LinkedIn</a>
      <a routerLink="/imprint">{{ 'footer.imprint' | t }}</a>
      <a routerLink="/privacy">{{ 'footer.privacy' | t }}</a>
    </div>
  </div>
</footer>
